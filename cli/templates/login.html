<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tenement - Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #111; border: 1px solid #1a1a1a; border-radius: 0.5rem; padding: 2rem; width: 100%; max-width: 400px; }
        h2 { font-size: 1.25rem; margin-bottom: 1.5rem; text-align: center; }
        .error { background: #450a0a; color: #fca5a5; padding: 0.75rem 1rem; border-radius: 0.375rem; margin-bottom: 1rem; font-size: 0.875rem; border: 1px solid #7f1d1d; }
        .text-gray { color: #666; }
        .text-sm { font-size: 0.8rem; }
        .mono { font-family: "SF Mono", "Fira Code", monospace; font-size: 0.8rem; }
        input { background: #111; border: 1px solid #333; color: #e5e5e5; padding: 0.5rem 0.75rem; border-radius: 0.25rem; font-size: 0.875rem; width: 100%; }
        input:focus { outline: none; border-color: #60a5fa; }
        .btn { display: block; width: 100%; padding: 0.5rem; font-size: 0.875rem; border: 1px solid #333; background: #1a1a1a; color: #e5e5e5; border-radius: 0.25rem; cursor: pointer; margin-top: 1rem; }
        .btn:hover { background: #222; border-color: #444; }
        label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 0.25rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        {% if let Some(err) = error %}
        <div class="error">{{ err }}</div>
        {% endif %}
        <form method="post" action="/login">
            <div>
                <label for="token">Admin Token</label>
                <input type="password" id="token" name="token" required placeholder="Enter your admin token" />
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        <p class="text-sm text-gray" style="margin-top: 1rem; text-align: center;">
            Run <code class="mono">ten token-gen</code> to generate a token
        </p>
    </div>
</body>
</html>
