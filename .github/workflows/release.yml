name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  # Build wheels for multiple platforms (PyPI)
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Setup Node (for dashboard)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dashboard
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Copy dashboard dist into CLI crate
        run: cp -r dashboard/dist cli/dashboard-dist

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist

  # Build source distribution
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (for dashboard)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dashboard
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Copy dashboard dist into CLI crate
        run: cp -r dashboard/dist cli/dashboard-dist

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # Publish to PyPI using trusted publishing
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sdist]
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/tenement
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # Publish to crates.io
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node (for dashboard)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install soup CLI
        run: curl -fsSL https://getsoup.dev/install.sh | sh

      - name: Build dashboard
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Copy dashboard dist into CLI crate
        run: cp -r dashboard/dist cli/dashboard-dist

      - name: Publish tenement lib
        env:
          SOUP_TOKEN: ${{ secrets.SOUP_TOKEN }}
          SOUP_ORG: russellromney
        run: |
          ~/.soup/bin/soup run --project tenement --env development -- \
            cargo publish -p tenement --allow-dirty

      - name: Wait for crates.io to index
        run: sleep 30

      - name: Publish tenement-cli
        env:
          SOUP_TOKEN: ${{ secrets.SOUP_TOKEN }}
          SOUP_ORG: russellromney
        run: |
          ~/.soup/bin/soup run --project tenement --env development -- \
            cargo publish -p tenement-cli --allow-dirty

  # Deploy docs to Cloudflare Pages
  deploy-docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install soup CLI
        run: curl -fsSL https://getsoup.dev/install.sh | sh

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        run: npx astro build

      - name: Deploy to Cloudflare Pages
        env:
          SOUP_TOKEN: ${{ secrets.SOUP_TOKEN }}
          SOUP_ORG: russellromney
        run: |
          ~/.soup/bin/soup run --project tenement --env development -- \
            npx wrangler pages deploy website/dist --project-name tenement
